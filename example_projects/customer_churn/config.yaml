# Customer Churn — sample project config
# Generated by `python run.py` (no --config flag)

project:
  name: customer_churn
  description: "Predict customer churn from demographic and behavioral data"

data_source:
  type: csv                              # csv | bigquery | gcs
  path: "data.csv"                       # local path (csv) or gs://bucket/file (gcs)
  target_column: churned                 # name of target column

llm:
  provider: ""                           # gemini | openai | claude | "" (disable LLM)
  model: ""                              # e.g., gemini-1.5-pro, gpt-4o-mini
  api_key_env: ""                        # env var holding API key (e.g., GEMINI_API_KEY)

agents:
  data:
    enabled: true
    test_size: 0.2
    llm_analysis: false                  # LLM profiles data for quality issues

  features:
    enabled: true
    llm_engineering: false               # LLM writes custom feature engineering code
    max_transformations: 5

  train:
    enabled: true
    algorithms: [auto]                   # auto | [logistic_regression, random_forest, xgboost, lightgbm]
    hyperopt_trials: 0                   # 0 = disabled, >0 = optuna trials

  eval:
    enabled: true
    llm_report: false                    # LLM generates executive summary + recommendations
    thresholds:
      min_accuracy: 0.5                  # fail if below this
      min_r2: 0.0                        # fail if below this (regression only)
